name: Evaluate Campaigns

on:
  schedule:
    - cron: '0 9 * * *'  # Daily at 9 AM UTC
  workflow_dispatch:       # Manual trigger

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Evaluate pending campaigns
        run: python run.py evaluate
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}

      - name: Show status
        run: python run.py status
        env:
          MAILERLITE_API_KEY: ${{ secrets.MAILERLITE_API_KEY }}

      - name: Commit updated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.tsv
          git diff --cached --quiet || git commit -m "Update experiment results [skip ci]"
          git push
